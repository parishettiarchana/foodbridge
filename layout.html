<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FoodBridge AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('home') }}" aria-label="FoodBridge AI home">
      <span class="brand-mark">FB</span>
      <span>FoodBridge AI</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle>
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" data-nav>
      <a href="{{ url_for('donor') }}">Donor</a>
      <a href="{{ url_for('donate_food') }}">Donate food</a>
      <a href="{{ url_for('marketplace') }}">Marketplace</a>
      <a href="{{ url_for('ngo') }}">NGO</a>
      <a href="{{ url_for('volunteer') }}">Volunteer</a>
      <a href="{{ url_for('feedback') }}">Feedback</a>
      <a href="{{ url_for('analytics') }}">Analytics</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>FoodBridge AI</span>
    <span>Rescue food faster with smarter matching.</span>
  </footer>
  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
